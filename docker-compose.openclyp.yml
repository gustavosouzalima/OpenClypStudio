# Arquivo de variáveis: .env.openclyp  (copie de .env.openclyp.example)
# Para subir: docker compose -f docker-compose.openclyp.yml --env-file .env.openclyp up -d --build

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PIXEL_HOST: "0.0.0.0"
      PIXEL_PORT: "8000"
      PIXEL_DATA_DIR: "/data"
      PIXEL_LOG_LEVEL: "info"
      PIXEL_API_KEY: "${PIXEL_API_KEY}"
      # ── Transcription tuning (override via .env.openclyp) ──
      PIXEL_DEFAULT_WHISPER_MODEL: "${PIXEL_DEFAULT_WHISPER_MODEL:-small}"
      PIXEL_DEFAULT_BATCH_SIZE: "${PIXEL_DEFAULT_BATCH_SIZE:-4}"
      PIXEL_MAX_BATCH_SIZE_CPU: "${PIXEL_MAX_BATCH_SIZE_CPU:-4}"
      PIXEL_FORCE_CPU_SAFE_MODEL: "${PIXEL_FORCE_CPU_SAFE_MODEL:-true}"
      PIXEL_CPU_SAFE_MODEL: "${PIXEL_CPU_SAFE_MODEL:-small}"
      PIXEL_TRANSCRIBE_CHUNK_SECONDS: "${PIXEL_TRANSCRIBE_CHUNK_SECONDS:-120}"
      PIXEL_TRANSCRIBE_CHUNK_OVERLAP_SECONDS: "${PIXEL_TRANSCRIBE_CHUNK_OVERLAP_SECONDS:-1.0}"
    volumes:
      - openclyp_data:/data
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=3)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 10G
          cpus: "2"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: "production"
      PORT: "4711"
      NEXT_PUBLIC_SITE_URL: "${NEXT_PUBLIC_SITE_URL:-https://openclyp.smartiabr.com}"
      NEXT_PUBLIC_PIXEL_API_BASE_URL: "http://backend:8000"
      NEXT_PUBLIC_PIXEL_API_KEY: "${PIXEL_API_KEY}"
      # ── Auth simples ──────────────────────────────────────────────────
      SESSION_SECRET: "${SESSION_SECRET}"        # obrigatório
      ADMIN_PASSWORD: "${ADMIN_PASSWORD}"        # obrigatório
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET}" # recomendado
    expose:
      - "4711"
    depends_on:
      backend:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.openclyp.rule=Host(`${TRAEFIK_HOST:-openclyp.smartiabr.com}`)"
      - "traefik.http.routers.openclyp.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}"
      - "traefik.http.routers.openclyp.tls=true"
      - "traefik.http.routers.openclyp.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}"
      - "traefik.http.services.openclyp.loadbalancer.server.port=4711"
      - "traefik.docker.network=${TRAEFIK_DOCKER_NETWORK:-traefik-public}"
    networks:
      - default
      - traefik-public
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4711/health > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  openclyp_data:

networks:
  traefik-public:
    external: true
    name: "${TRAEFIK_DOCKER_NETWORK:-traefik-public}"
