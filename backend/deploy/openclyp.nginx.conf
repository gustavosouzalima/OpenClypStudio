# Nginx reverse proxy para OpenClyp Studio
# Coloque em /etc/nginx/sites-available/openclyp e faça symlink para sites-enabled
#
# Para HTTP simples (IP direto ou sem SSL):
#   server_name _;
#
# Para domínio com HTTPS (recomendado):
#   1. Troque server_name pelo seu domínio
#   2. Rode: certbot --nginx -d seudominio.com
#
# O frontend roda na porta 4711 (Docker).
# O backend é acessado internamente pelo frontend via rede Docker — não exposto aqui.

server {
    listen 80;
    server_name _;   # Troque pelo seu domínio ou IP

    client_max_body_size 512M;   # permite uploads de video grandes

    location / {
        proxy_pass         http://127.0.0.1:4711;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket (usado pelo Next.js HMR e pelo editor)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
    }
}
